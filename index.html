    function initTables() {
      return Array.from({ length: 30 }, (_, i) => ({ id: i + 1, orders: [], note: "", openedAt: null }));
    }
    function getItemName(o) {
      const item = ALL_ITEMS.find(x => x.id === o.itemId);
      return item ? item.name : (o.customName || o.itemId);
    }
    function getItemPrice(o) {
      const item = ALL_ITEMS.find(x => x.id === o.itemId);
      return item ? item.price : (o.customPrice !== undefined ? o.customPrice : null);
    }
    function tableTotal(table) {
      return table.orders.reduce((sum, o) => {
        const p = getItemPrice(o);
        return sum + (p !== null ? p * o.qty : 0);
      }, 0);
    }
    function fmt(n) { return n.toFixed(2).replace(".", ",") + " €"; }

    function printComanda(table) {
      const total = tableTotal(table);
      const now = new Date();
      const timeStr = now.toLocaleTimeString("it-IT", { hour: "2-digit", minute: "2-digit" });
      const dateStr = now.toLocaleDateString("it-IT");
      const rows = table.orders.map(o => {
        const p = getItemPrice(o);
        return `<tr>
          <td style="padding:3px 5px;border-bottom:1px solid #eee;">${getItemName(o)}</td>
          <td style="padding:3px 5px;border-bottom:1px solid #eee;text-align:center;">x${o.qty}</td>
          <td style="padding:3px 5px;border-bottom:1px solid #eee;text-align:right;">${p !== null ? fmt(p * o.qty) : "—"}</td>

      <style>
        @page { margin: 5mm; }
        body{font-family:monospace;font-size:12px;margin:0;padding:5px;}
        h2{text-align:center;margin:0 0 2px;font-size:14px;}

        .total{font-size:14px;font-weight:bold;text-align:right;border-top:2px solid #000;padding-top:4px;margin-top:2px;}
        .note{font-size:10px;color:#555;margin-top:6px;border-top:1px dashed #aaa;padding-top:4px;}
        .footer{text-align:center;font-size:9px;color:#aaa;margin-top:8px;border-top:1px solid #eee;padding-top:4px;}
      </style></head><body>
      <h2>Les Gourmets</h2>
      <div class="sub">Tavolo ${table.id} — ${dateStr} ore ${timeStr}</div>
      <table>${rows}</table>
      <div class="total">TOTALE: ${fmt(total)}</div>
      ${table.note ? `<div class="note">Note: ${table.note}</div>` : ""}
      <div class="footer">Via Ugo La Malfa 32/34 • Tel. 0883 021253</div>
      </body></html>`;
      const w = window.open("", "_blank", "width=380,height=580");
      if (w) { w.document.write(html); w.document.close(); w.onload = () => { w.focus(); w.print(); }; }
    }

      receiptMid: { color: "#888", fontSize: 11, whiteSpace: "nowrap" },
      receiptPrice: { fontWeight: 700, color: "#fbbf24", width: 58, textAlign: "right" },
      receiptNote: { background: "#1a1008", borderRadius: 7, padding: "7px 10px", fontSize: 12, color: "#ccc", marginBottom: 10 },
      receiptTotalRow: { display: "flex", justifyContent: "space-between", alignItems: "center", borderTop: "2px solid #c8923a", paddingTop: 11, marginTop: 7, fontWeight: 800, fontSize: 16 },
      receiptTotalNum: { color: "#c8923a", fontSize: 21 },
      closeTableBtn: { marginTop: 16, width: "100%", background: "#c0392b", color: "#fff", border: "none", borderRadius: 10, padding: "13px 0", fontWeight: 800, fontSize: 15, cursor: "pointer" },
      emptyMsg: { color: "#888", textAlign: "center", padding: "16px 0", fontSize: 13 },
      toast: { position: "fixed", bottom: 20, left: "50%", transform: "translateX(-50%)", background: "#4ade80", color: "#1a1008", padding: "9px 20px", borderRadius: 18, fontWeight: 700, fontSize: 13, zIndex: 999, boxShadow: "0 4px 14px rgba(0,0,0,0.3)", whiteSpace: "nowrap" },
    };

    // ── APP COMPONENT ─────────────────────────────────────────────────────────
    function App() {
      const [tables, setTables] = useState(() => loadData() || initTables());
      const [selected, setSelected] = useState(null);
      const [view, setView] = useState("grid");
      const [activeCategory, setActiveCategory] = useState(Object.keys(MENU)[0]);
      const [toast, setToast] = useState(null);
      const [search, setSearch] = useState("");
      const [quickName, setQuickName] = useState("");
      const [quickPrice, setQuickPrice] = useState("");
      const [showQuick, setShowQuick] = useState(false);

      useEffect(() => { saveData(tables); }, [tables]);

      function showToast(msg) { setToast(msg); setTimeout(() => setToast(null), 2400); }

      function openTable(id) {
        setTables(prev => prev.map(t => t.id === id && !t.openedAt ? { ...t, openedAt: new Date().toISOString() } : t));
        setSelected(id); setView("detail");
        setActiveCategory(Object.keys(MENU)[0]);
        setSearch(""); setShowQuick(false);
      }

      function addItem(tableId, itemId) {
        setTables(prev => prev.map(t => {
          if (t.id !== tableId) return t;
          const ex = t.orders.find(o => o.itemId === itemId);
          if (ex) return { ...t, orders: t.orders.map(o => o.itemId === itemId ? { ...o, qty: o.qty + 1 } : o) };
          return { ...t, orders: [...t.orders, { itemId, qty: 1 }] };
        }));
      }

      function addQuickItem(tableId) {
        const name = quickName.trim();
        if (!name) { showToast("Inserisci almeno il nome"); return; }
        const rawPrice = quickPrice.trim().replace(",", ".");
        const price = rawPrice === "" ? null : parseFloat(rawPrice);
        if (rawPrice !== "" && isNaN(price)) { showToast("Prezzo non valido"); return; }
        const customId = "custom_" + Date.now();
        setTables(prev => prev.map(t => {
          if (t.id !== tableId) return t;
          return { ...t, orders: [...t.orders, { itemId: customId, customName: name, customPrice: price, qty: 1 }] };
        }));
        setQuickName(""); setQuickPrice(""); setShowQuick(false);
        showToast(`"${name}" aggiunto ✓`);
      }

      function changeQty(tableId, itemId, delta) {
        setTables(prev => prev.map(t => {
          if (t.id !== tableId) return t;
          const orders = t.orders.map(o => o.itemId === itemId ? { ...o, qty: Math.max(0, o.qty + delta) } : o).filter(o => o.qty > 0);
          return { ...t, orders };
        }));
      }

      function setTableNote(tableId, note) {
        setTables(prev => prev.map(t => t.id === tableId ? { ...t, note } : t));
      }

      function closeTable(tableId) {
        setTables(prev => prev.map(t => t.id === tableId ? { ...t, orders: [], note: "", openedAt: null } : t));
        showToast(`Tavolo ${tableId} chiuso ✓`);
        setView("grid"); setSelected(null);
      }

      const currentTable = tables.find(t => t.id === selected);
      const searchResults = search.length >= 2 ? ALL_ITEMS.filter(i => i.name.toLowerCase().includes(search.toLowerCase())) : [];
      const occupied = tables.filter(t => t.orders.length > 0).length;

      // GRID
      if (view === "grid") return (
        <div style={S.app}>
          <header style={S.header}>
            <span style={S.logo}>🍷 Les Gourmets</span>
            <span style={S.badge}>{occupied} tavoli occupati</span>
          </header>
          <div style={S.gridWrap}>
            {tables.map(t => {
              const isOcc = t.orders.length > 0;
              return (
                <button key={t.id} style={{...S.tableCard, ...(isOcc ? S.tableOcc : S.tableFree)}} onClick={() => openTable(t.id)}>
                  <span style={S.tableNum}>{t.id}</span>
                  {isOcc ? (<>
                    <span style={S.tableItems}>{t.orders.reduce((s,o)=>s+o.qty,0)} pz</span>
                    <span style={S.tableTotal}>{fmt(tableTotal(t))}</span>
                  </>) : <span style={S.tableFreeLabel}>Libero</span>}
                </button>
              );
            })}
          </div>
          <div style={S.legend}>
            <span style={{...S.dot, background:"#4ade80"}}/> Libero &nbsp;
            <span style={{...S.dot, background:"#c8923a"}}/> Occupato
          </div>
          {toast && <div style={S.toast}>{toast}</div>}
        </div>
      );

      // DETAIL
      if (view === "detail" && currentTable) {
        const displayItems = search.length >= 2 ? searchResults : (MENU[activeCategory] || []);
        return (
          <div style={S.app}>
            <header style={S.header}>
              <button style={S.backBtn} onClick={() => {setView("grid"); setSelected(null);}}>← Tavoli</button>
              <span style={S.logo}>Tavolo {currentTable.id}</span>
              <button style={S.checkoutBtn} onClick={() => setView("checkout")}>Conto</button>
            </header>

            <div style={S.searchWrap}>
              <input style={S.searchInput} placeholder="🔍 Cerca prodotto..." value={search} onChange={e => setSearch(e.target.value)} />
            </div>

            {search.length < 2 && (
              <div style={S.tabs}>
                {Object.keys(MENU).map(cat => (
                  <button key={cat} style={{...S.tab, ...(activeCategory===cat ? S.tabActive : {})}} onClick={() => setActiveCategory(cat)}>{cat}</button>
                ))}
              </div>
            )}

            <div style={S.menuGrid}>
              {displayItems.map(item => {
                const order = currentTable.orders.find(o => o.itemId === item.id);
                return (
                  <div key={item.id} style={S.menuItem}>
                    <div style={S.menuItemName}>{item.name}</div>
                    <div style={S.menuItemPrice}>{fmt(item.price)}</div>
                    {order ? (
                      <div style={S.qtyRow}>
                        <button style={S.qtyBtn} onClick={() => changeQty(currentTable.id, item.id, -1)}>−</button>
                        <span style={S.qtyNum}>{order.qty}</span>
                        <button style={S.qtyBtn} onClick={() => changeQty(currentTable.id, item.id, +1)}>+</button>
                      </div>
                    ) : (
                      <button style={S.addBtn} onClick={() => addItem(currentTable.id, item.id)}>+ Aggiungi</button>
                    )}
                  </div>
                );
              })}
              {search.length >= 2 && searchResults.length === 0 && (
                <div style={{color:"#888", gridColumn:"1/-1", textAlign:"center", padding:20}}>Nessun risultato per "{search}"</div>
              )}
            </div>

            <div style={S.quickWrap}>
              <button style={S.quickToggle} onClick={() => setShowQuick(!showQuick)}>
                {showQuick ? "✕ Annulla" : "⚡ Aggiunta rapida"}
              </button>
              {showQuick && (
                <div style={S.quickForm}>
                  <input style={S.quickInput} placeholder="Nome prodotto *" value={quickName} onChange={e => setQuickName(e.target.value)} />
                  <input style={{...S.quickInput, flex:"0 0 110px"}} placeholder="Prezzo € (opz.)" value={quickPrice} onChange={e => setQuickPrice(e.target.value)} inputMode="decimal" />
                  <button style={S.quickAddBtn} onClick={() => addQuickItem(currentTable.id)}>Aggiungi</button>
                </div>
              )}
            </div>

            {currentTable.orders.length > 0 && (
              <div style={S.summary}>
                <div style={S.summaryTitle}>📋 Comanda — {fmt(tableTotal(currentTable))}</div>
                {currentTable.orders.map(o => {
                  const p = getItemPrice(o);
                  return (
                    <div key={o.itemId} style={S.summaryRow}>
                      <span style={S.summaryName}>{getItemName(o)}</span>
                      <span style={S.summaryQty}>x{o.qty}</span>
                      <span style={S.summaryPrice}>{p !== null ? fmt(p * o.qty) : "—"}</span>
                      <button style={S.removeBtn} onClick={() => changeQty(currentTable.id, o.itemId, -o.qty)}>✕</button>
                    </div>
                  );
                })}
              </div>
            )}

            <div style={S.noteWrap}>
              <textarea style={S.noteInput} placeholder="📝 Note tavolo..." value={currentTable.note} onChange={e => setTableNote(currentTable.id, e.target.value)} />
            </div>
            {toast && <div style={S.toast}>{toast}</div>}
          </div>
        );
      }

      // CHECKOUT
      if (view === "checkout" && currentTable) {
        const total = tableTotal(currentTable);
        const openedAt = currentTable.openedAt ? new Date(currentTable.openedAt) : null;
        return (
          <div style={S.app}>
            <header style={S.header}>
              <button style={S.backBtn} onClick={() => setView("detail")}>← Comanda</button>
              <span style={S.logo}>Conto — Tavolo {currentTable.id}</span>
              <button style={S.printBtn} onClick={() => printComanda(currentTable)}>🖨️ Stampa</button>
            </header>
            <div style={S.receiptWrap}>
              <div style={S.receiptHeader}>
                <div style={S.receiptTitle}>🧾 Les Gourmets — Tavolo {currentTable.id}</div>
                {openedAt && <div style={S.receiptTime}>Aperto: {openedAt.toLocaleTimeString("it-IT",{hour:"2-digit",minute:"2-digit"})}</div>}
              </div>
              {currentTable.orders.length === 0 && <div style={S.emptyMsg}>Nessuna comanda.</div>}
              {currentTable.orders.map(o => {
                const p = getItemPrice(o);
                return (
                  <div key={o.itemId} style={S.receiptRow}>
                    <span style={S.receiptName}>{getItemName(o)}</span>
                    <span style={S.receiptMid}>{p !== null ? `x${o.qty} × ${fmt(p)}` : `x${o.qty}`}</span>
                    <span style={S.receiptPrice}>{p !== null ? fmt(p * o.qty) : "—"}</span>
                  </div>
                );
              })}
              {currentTable.note && <div style={S.receiptNote}>📝 {currentTable.note}</div>}
              <div style={S.receiptTotalRow}>
                <span>TOTALE</span>
                <span style={S.receiptTotalNum}>{fmt(total)}</span>
              </div>
              <button style={S.closeTableBtn} onClick={() => closeTable(currentTable.id)}>✓ Chiudi tavolo e azzera</button>
            </div>
            {toast && <div style={S.toast}>{toast}</div>}
          </div>
        );
      }

      return null;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

  <!-- Service Worker per PWA offline -->
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    }
  </script>
</body>
</html>
